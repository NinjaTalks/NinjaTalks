<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ninja Talks – Tribute Songs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/NinjaTalks/assets/css/global.css">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #333;
      color: #fff;
    }
    .download-btn {
      padding: 6px 12px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .download-btn:hover {
      background: #555;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="logo">
    <h1>NINJA TALKS</h1>
  </div>
  <nav>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
  </nav>
</header>

<main>
  <section class="hero">
    <h2 class="hero-title">Tribute Songs</h2>
    <p class="hero-tagline">Community‑submitted Ninja Talks music.</p>
    <a href="https://forms.gle/bVPBUvQKiitrA1BV7" class="btn">Submit a Tribute</a>
    <p class="note">⚠️ Only MP3 files are accepted for uploads.</p>
  </section>

  <section>
    <h3>Latest Tributes</h3>
    <table id="tribute-table">
      <thead>
        <tr>
          <th>Artist Name</th>
          <th>Song Title</th>
          <th>Download</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<footer>
  <p>&copy; Ninja Talks</p>
</footer>

<script>
function toggleMenu() {
  document.getElementById("sideMenu")?.classList.toggle("open");
}

// ✅ Fetch from your new Web App URL
fetch("https://script.google.com/macros/s/AKfycbz6A_Y5EosnVg6YfNq9P96KJIvXiZPa8INpi5MbIwZB4iXGK1IODjVYcNOZH1q-VDfd/exec")
  .then(response => response.json())
  .then(data => {
    const tbody = document.querySelector("#tribute-table tbody");

    if (!data || data.length === 0) {
      tbody.innerHTML = "<tr><td colspan='3'>No approved tributes yet — submit one above!</td></tr>";
      return;
    }

    data.forEach(song => {
      if (song["approved"] && song["approved"].toString().toLowerCase() === "yes") {
        let link = song["upload mp3 file"];
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${song["artist name"]}</td>
          <td>${song["song title"]}</td>
          <td><a href="${link}" class="download-btn" download>⬇ Download</a></td>
        `;
        tbody.appendChild(row);
      }
    });
  })
  .catch(error => {
    console.error("Error loading songs:", error);
    const tbody = document.querySelector("#tribute-table tbody");
    tbody.innerHTML = "<tr><td colspan='3'>Unable to load songs right now.</td></tr>";
  });
</script>

</body>
</html>
