<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ninja Talks – Tribute Songs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/NinjaTalks/assets/css/global.css">
</head>
<body>

<header>
  <div class="logo-container">
    <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="logo">
    <h1>NINJA TALKS</h1>
  </div>
  <nav>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
  </nav>
</header>

<div class="side-menu" id="sideMenu">
  <button class="close-menu" onclick="toggleMenu()">✖</button>
  <ul>
    <li><a href="/NinjaTalks/index.html">Home</a></li>
    <li><a href="/NinjaTalks/neurodiversity.html">Neurodiversity</a></li>
    <li><a href="/NinjaTalks/wellness.html">Mind & Body</a></li>
    <li><a href="/NinjaTalks/storytime.html">Story Time</a></li>
    <li><a href="/NinjaTalks/fellowship.html">Fellowship</a></li>
    <li><a href="/NinjaTalks/music.html">AI Music</a></li>
    <li><a href="/NinjaTalks/shop.html">Shop</a></li>
    <li><a href="/NinjaTalks/tribute.html">Tribute Songs</a></li>
    <li><a href="/NinjaTalks/contact.html">Contact</a></li>
  </ul>
</div>

<main>
  <section class="hero">
    <div class="page-logo-container">
      <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="page-logo">
    </div>
    <h2 class="hero-title">Tribute Songs</h2>
    <p class="hero-tagline">Community‑submitted Ninja Talks music.</p>
    <a href="https://forms.gle/bVPBUvQKiitrA1BV7" class="btn">Submit a Tribute</a>
    <p class="note">⚠️ Only MP3 files are accepted for uploads.</p>
  </section>

  <section>
    <h3>Latest Tributes</h3>
    <div id="tribute-list" class="highlight-grid"></div>
  </section>
</main>

<footer>
  <p>&copy; Ninja Talks</p>
</footer>

<script>
function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("open");
}

// ✅ Fetch from your latest Web App URL
fetch("https://script.google.com/macros/s/AKfycbyYjdX_Nvpd6-UnDSAH6pDB5vVZMebnLglWSITjFzEojGBSQvSsztVVXQOjb7t2RkA2/exec")
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("tribute-list");

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No tributes yet — be the first to submit!</p>";
      return;
    }

    data.forEach(song => {
      // Only show approved rows
      if (song["approved"] && song["approved"].toString().toLowerCase() === "yes") {
        const card = document.createElement("div");
        card.className = "highlight-card";

        // Build audio player using the Upload MP3 File column
        let audioHTML = `<audio controls>`;
        if (song["upload mp3 file"]) {
          audioHTML += `<source src="${song["upload mp3 file"]}" type="audio/mpeg">`;
        }
        audioHTML += `Your browser does not support the audio element.</audio>`;

        // Build card content
        card.innerHTML = `
          <h4>🎵 ${song["song title"]}</h4>
          <p>by ${song["artist name"]}</p>
          ${audioHTML}
        `;

        container.appendChild(card);
      }
    });
  })
  .catch(error => {
    console.error("Error loading songs:", error);
    document.getElementById("tribute-list").innerHTML = "<p>Unable to load songs right now.</p>";
  });
</script>

</body>
</html>
