<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ninja Talks – Tribute Songs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/NinjaTalks/assets/css/global.css">
  <style>
    .status {
      font-weight: bold;
      margin-top: 5px;
    }
    .status.ready { color: green; }
    .status.not-approved { color: gray; }
    .status.restricted { color: red; }
    .download-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .download-btn:hover {
      background: #555;
    }
    .highlight-card {
      border: 1px solid #ddd;
      padding: 12px;
      margin: 10px;
      border-radius: 6px;
      background: #fafafa;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="logo">
    <h1>NINJA TALKS</h1>
  </div>
  <nav>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
  </nav>
</header>

<div class="side-menu" id="sideMenu">
  <button class="close-menu" onclick="toggleMenu()">✖</button>
  <ul>
    <li><a href="/NinjaTalks/index.html">Home</a></li>
    <li><a href="/NinjaTalks/neurodiversity.html">Neurodiversity</a></li>
    <li><a href="/NinjaTalks/wellness.html">Mind & Body</a></li>
    <li><a href="/NinjaTalks/storytime.html">Story Time</a></li>
    <li><a href="/NinjaTalks/fellowship.html">Fellowship</a></li>
    <li><a href="/NinjaTalks/music.html">AI Music</a></li>
    <li><a href="/NinjaTalks/shop.html">Shop</a></li>
    <li><a href="/NinjaTalks/tribute.html">Tribute Songs</a></li>
    <li><a href="/NinjaTalks/contact.html">Contact</a></li>
  </ul>
</div>

<main>
  <section class="hero">
    <div class="page-logo-container">
      <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="page-logo">
    </div>
    <h2 class="hero-title">Tribute Songs</h2>
    <p class="hero-tagline">Community‑submitted Ninja Talks music.</p>
    <a href="https://forms.gle/bVPBUvQKiitrA1BV7" class="btn">Submit a Tribute</a>
    <p class="note">⚠️ Only MP3 files are accepted for uploads.</p>
  </section>

  <section>
    <h3>Latest Tributes</h3>
    <div id="tribute-list" class="highlight-grid"></div>
  </section>
</main>

<footer>
  <p>&copy; Ninja Talks</p>
</footer>

<script>
function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("open");
}

// ✅ Fetch from your new Web App URL
fetch("https://script.google.com/macros/s/AKfycbx5XlvpAf-MDpAKNZsk61OwwFjkCT7vFvhhU4cQA82NTajH1A2hOVWfEub5tswAV649/exec")
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("tribute-list");

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No approved tributes yet — submit one above!</p>";
      return;
    }

    data.forEach(song => {
      if (song["approved"] && song["approved"].toString().toLowerCase() === "yes") {
        const card = document.createElement("div");
        card.className = "highlight-card";

        // Proxy link provided in JSON (exec?fileId=...)
        let link = song["upload mp3 file"];

        // Status badge
        let statusClass = "not-approved";
        let statusText = "Not approved";
        if (song["status"] && song["status"].toLowerCase() === "ready") {
          statusClass = "ready";
          statusText = "✅ Ready";
        } else if (song["status"] && song["status"].toLowerCase().includes("restricted")) {
          statusClass = "restricted";
          statusText = "⚠️ Restricted – check sharing settings";
        }

        // Build card content (no audio player, only download)
        card.innerHTML = `
          <h4>🎵 ${song["song title"]}</h4>
          <p>by ${song["artist name"]}</p>
          <p class="status ${statusClass}">Status: ${statusText}</p>
          <a href="${link}" class="download-btn" download>⬇ Download</a>
        `;

        container.appendChild(card);
      }
    });
  })
  .catch(error => {
    console.error("Error loading songs:", error);
    document.getElementById("tribute-list").innerHTML = "<p>Unable to load songs right now.</p>";
  });
</script>

</body>
</html>
